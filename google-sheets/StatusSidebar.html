<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      padding: 12px;
      margin: 0;
      background: #fff;
    }
    h3 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
    }
    #row-info {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 10px;
      min-height: 32px;
      padding: 6px 8px;
      background: #f9fafb;
      border-radius: 6px;
      line-height: 1.5;
    }
    #row-info .company {
      font-weight: 600;
      color: #111827;
      font-size: 12px;
    }
    .status-btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 5px;
      font-size: 12px;
      font-weight: 600;
      border: 2px solid transparent;
      border-radius: 7px;
      cursor: pointer;
      text-align: left;
      transition: filter 0.1s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .status-btn:hover { filter: brightness(0.95); }
    .status-btn.active {
      border-color: #374151;
      box-shadow: 0 0 0 2px rgba(55,65,81,0.15);
    }
    .status-btn .check {
      margin-left: auto;
      font-size: 13px;
      opacity: 0;
    }
    .status-btn.active .check { opacity: 1; }

    .status-btn[data-status="관심"]       { background: #f3f4f6; color: #374151; }
    .status-btn[data-status="지원 완료"]  { background: #dbeafe; color: #1d4ed8; }
    .status-btn[data-status="서류 통과"]  { background: #ede9fe; color: #6d28d9; }
    .status-btn[data-status="1차 면접"]   { background: #fef3c7; color: #d97706; }
    .status-btn[data-status="합격"]       { background: #d1fae5; color: #065f46; }
    .status-btn[data-status="불합격"]     { background: #fee2e2; color: #dc2626; }

    .status-btn.active[data-status="관심"]       { border-color: #374151; }
    .status-btn.active[data-status="지원 완료"]  { border-color: #1d4ed8; }
    .status-btn.active[data-status="서류 통과"]  { border-color: #6d28d9; }
    .status-btn.active[data-status="1차 면접"]   { border-color: #d97706; }
    .status-btn.active[data-status="합격"]       { border-color: #065f46; }
    .status-btn.active[data-status="불합격"]     { border-color: #dc2626; }

    #feedback {
      font-size: 11px;
      color: #059669;
      margin-top: 8px;
      min-height: 16px;
      text-align: center;
    }
    .disabled-overlay {
      opacity: 0.4;
      pointer-events: none;
    }
    #hint {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h3>진행 상태 변경</h3>
  <div id="row-info">데이터 행을 클릭하면 자동으로 감지됩니다.</div>
  <div id="buttons">
    <button type="button" class="status-btn" data-status="관심">관심 <span class="check">✓</span></button>
    <button type="button" class="status-btn" data-status="지원 완료">지원 완료 <span class="check">✓</span></button>
    <button type="button" class="status-btn" data-status="서류 통과">서류 통과 <span class="check">✓</span></button>
    <button type="button" class="status-btn" data-status="1차 면접">1차 면접 <span class="check">✓</span></button>
    <button type="button" class="status-btn" data-status="합격">합격 <span class="check">✓</span></button>
    <button type="button" class="status-btn" data-status="불합격">불합격 <span class="check">✓</span></button>
  </div>
  <div id="feedback"></div>
  <div id="hint">1~2초 간격으로 자동 감지됩니다.</div>

  <script>
    let currentRow = null;
    let currentStatus = null;
    let busy = false;

    const rowInfoEl = document.getElementById('row-info');
    const feedbackEl = document.getElementById('feedback');
    const buttonsEl = document.getElementById('buttons');
    const buttons = document.querySelectorAll('.status-btn');

    function updateRowInfo(info) {
      if (!info) {
        rowInfoEl.innerHTML = '데이터 행을 클릭하면 자동으로 감지됩니다.';
        buttonsEl.classList.add('disabled-overlay');
        buttons.forEach(b => b.classList.remove('active'));
        currentRow = null;
        currentStatus = null;
        return;
      }
      if (info.row === currentRow && info.status === currentStatus) return;

      currentRow = info.row;
      currentStatus = info.status;
      feedbackEl.textContent = '';
      buttonsEl.classList.remove('disabled-overlay');

      const company = info.company ? `<span class="company">${info.company}</span>` : '<span style="color:#9ca3af">회사명 없음</span>';
      rowInfoEl.innerHTML = `${company} &nbsp;·&nbsp; ${info.row}행`;

      buttons.forEach(b => {
        b.classList.toggle('active', b.dataset.status === info.status);
      });
    }

    function poll() {
      google.script.run
        .withSuccessHandler(updateRowInfo)
        .withFailureHandler(() => {})
        .getCurrentRowInfo();
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!currentRow || busy) return;
        busy = true;
        const status = btn.dataset.status;
        buttonsEl.classList.add('disabled-overlay');
        feedbackEl.textContent = '';

        google.script.run
          .withSuccessHandler(() => {
            currentStatus = status;
            buttons.forEach(b => b.classList.toggle('active', b.dataset.status === status));
            feedbackEl.textContent = '✓ 변경되었습니다';
            buttonsEl.classList.remove('disabled-overlay');
            busy = false;
          })
          .withFailureHandler((err) => {
            alert('오류: ' + err.message);
            buttonsEl.classList.remove('disabled-overlay');
            busy = false;
          })
          .setStatusFromSidebar(status);
      });
    });

    // 초기 로드 및 주기적 폴링
    poll();
    setInterval(poll, 1500);
  </script>
</body>
</html>
